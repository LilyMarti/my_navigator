<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的灵动导航 | 云同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1.5rem 4rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #1f3b4c, #2c5a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .toolbar {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #2c5a6e;
            color: white;
            border: none;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
            border: none;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .search-box {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            padding: 0.9rem 1.8rem;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
        }

        .categories {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .category {
            margin-bottom: 1rem;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(44,90,110,0.2);
        }

        .category-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e3b4a;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }

        .nav-card {
            background: white;
            border-radius: 20px;
            padding: 1.2rem;
            text-decoration: none;
            display: block;
            border: 1px solid #e9edf2;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .nav-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 卡片管理按钮（悬浮显示） */
        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
            gap: 5px;
            background: rgba(255,255,255,0.95);
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .nav-card:hover .card-actions {
            display: flex;
        }

        .card-edit-btn, .card-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 16px;
            transition: all 0.2s;
        }

        .card-edit-btn:hover {
            background: #eef2f8;
        }

        .card-delete-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f3b4c;
            margin-bottom: 0.3rem;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #6b7f8e;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,240,0.6);
            border-radius: 48px;
            color: #6b7f8e;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.6rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .form-actions {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-top: 1.2rem;
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.8rem;
            color: #8a9dad;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* 删除确认对话框样式 */
        .confirm-modal {
            max-width: 350px;
            text-align: center;
        }

        .confirm-modal p {
            margin: 1rem 0;
            color: #6b7f8e;
        }

        .confirm-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="logo-area">
            <h1>✨ 我的导航栈</h1>
            <div class="toolbar">
                <button id="themeToggleBtn">🌓 暗色模式</button>
                <button id="layoutToggleBtn">📋 列表视图</button>
                <button id="addLinkBtn" class="btn-primary" style="display: none;">➕ 新建</button>
                <button id="loginBtn">🔐 登录</button>
                <span id="userInfo" style="display: none;">
                    <span id="userEmail"></span>
                    <button id="logoutBtn">🚪 退出</button>
                </span>
            </div>
        </div>
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索网站...">
    </div>

    <div id="categoriesContainer" class="categories">
        <div class="no-results">🔐 请点击右上角"登录"按钮开始使用</div>
    </div>

    <div class="footer">
        <p>⚡ 云同步导航 · 多端数据共享 · 鼠标悬停卡片显示编辑/删除按钮</p>
    </div>
</div>

<!-- 登录模态框 -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>🔐 管理员登录</h3> <form id="authForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="authEmail" required placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="authPassword" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary" id="authSubmitBtn" style="width: 100%;">登录</button>
            </div>
        </form>
        <button id="closeLoginModal" style="margin-top: 1rem; width: 100%; border: none; background: none; color: #8a9dad;">取消</button>
    </div>
</div>

<!-- 添加/编辑链接模态框 -->
<div id="linkModal" class="modal">
    <div class="modal-content">
        <h3 id="linkModalTitle">添加链接</h3>
        <form id="linkForm">
            <div class="form-group">
                <label>分类</label>
                <input type="text" id="linkCategory" required placeholder="📌 常用工具">
            </div>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="linkTitle" required>
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="linkDesc" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>网址</label>
                <input type="url" id="linkUrl" required>
            </div>
            <div class="form-group">
                <label>图标 (Emoji)</label>
                <input type="text" id="linkIcon" placeholder="🔗">
            </div>
            <div class="form-actions">
                <button type="button" id="closeLinkModal">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 删除确认模态框 -->
<div id="confirmModal" class="modal">
    <div class="modal-content confirm-modal">
        <h3>⚠️ 确认删除</h3>
        <p id="confirmMessage">确定要删除这个链接吗？</p>
        <div class="confirm-actions">
            <button id="cancelDeleteBtn" class="btn-secondary">取消</button>
            <button id="confirmDeleteBtn" class="btn-danger">删除</button>
        </div>
    </div>
</div>

<script>
    // Supabase 配置
    const SUPABASE_URL = 'https://uehqgiqwvevvevsxxyoe.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlaHFnaXF3dmV2dmV2c3h4eW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTUyNDcsImV4cCI6MjA5MjkzMTI0N30.P4pAwMmuDB81izf2HB__AAYQ0mXYIZPQoEtrDHoz8JQ';
    
    let supabaseClient = null;
    let currentUser = null;
    let sitesData = [];
    let isLoginMode = true;
    let currentEditId = null;      // 当前编辑的链接ID
    let pendingDeleteId = null;     // 待删除的链接ID
    
    // DOM 元素
    const categoriesContainer = document.getElementById('categoriesContainer');
    const searchInput = document.getElementById('searchInput');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const addLinkBtn = document.getElementById('addLinkBtn');
    const userInfo = document.getElementById('userInfo');
    const userEmailSpan = document.getElementById('userEmail');
    const loginModal = document.getElementById('loginModal');
    const linkModal = document.getElementById('linkModal');
    const confirmModal = document.getElementById('confirmModal');
    const authForm = document.getElementById('authForm');
    const authEmail = document.getElementById('authEmail');
    const authPassword = document.getElementById('authPassword');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    
    // 初始化 Supabase
    async function initSupabase() {
        if (typeof supabase === 'undefined') {
            console.error('Supabase SDK 未加载');
            return false;
        }
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        return true;
    }
    
    // 检查登录状态
   async function checkAuth() {
    if (!supabaseClient) return;
    const { data: { session } } = await supabaseClient.auth.getSession();
    
    // 始终加载数据，让所有人都能看到导航内容
    await loadLinks();

    if (session) {
        currentUser = session.user;
        userEmailSpan.textContent = currentUser.email.split('@')[0];
        loginBtn.style.display = 'none';
        userInfo.style.display = 'flex';
        addLinkBtn.style.display = 'inline-flex';
    } else {
        currentUser = null;
        loginBtn.style.display = 'inline-flex';
        userInfo.style.display = 'none';
        addLinkBtn.style.display = 'none';
    }
}
    
    // 加载链接
   async function loadLinks() {
    // 删掉 if (!currentUser) return; 这一行
    
    const { data, error } = await supabaseClient
        .from('links')
        .select('*')
        // 如果你有多个用户，但想展示所有人的，就删掉 .eq('user_id', ...)
        // 如果只想展示特定管理员的，可以硬编码该管理员的 ID，或者不加过滤
        .order('created_at', { ascending: false });
        
    if (error) {
        console.error('加载失败:', error);
        showEmptyState('数据加载失败，请检查数据库权限');
        return;
    }
    
    sitesData = data || [];
    render();
}
    // 删除链接
    async function deleteLink(id) {
        if (!id) return;
        
        const { error } = await supabaseClient
            .from('links')
            .delete()
            .eq('id', id);
        
        if (error) {
            alert('删除失败: ' + error.message);
            return false;
        }
        
        // 重新加载数据
        await loadLinks();
        showToast('✅ 已删除');
        return true;
    }
    
    // 编辑链接
    async function updateLink(id, linkData) {
        const { error } = await supabaseClient
            .from('links')
            .update(linkData)
            .eq('id', id);
        
        if (error) {
            alert('更新失败: ' + error.message);
            return false;
        }
        
        await loadLinks();
        showToast('✅ 已更新');
        return true;
    }
    
    // 渲染页面
    function render() {
        if (!sitesData.length) {
            showEmptyState('✨ 暂无链接，点击"新建"添加第一个导航');
            return;
        }
        
        // 按分类分组
        const groups = {};
        sitesData.forEach(site => {
            if (!groups[site.category]) groups[site.category] = [];
            groups[site.category].push(site);
        });
        
        let html = '';
        for (const [category, items] of Object.entries(groups)) {
            html += `
                <div class="category">
                    <div class="category-header">
                        <div class="category-title">${escapeHtml(category)} <span style="font-size:0.9rem;">(${items.length})</span></div>
                    </div>
                    <div class="card-grid">
            `;
            
           // 在 items.forEach 循环内部修改
items.forEach(site => {
    // 只有当 currentUser 存在时，才生成操作按钮的 HTML
    const adminActions = currentUser ? `
        <div class="card-actions">
            <button class="card-edit-btn" data-id="${site.id}" title="编辑">✏️ 编辑</button>
            <button class="card-delete-btn" data-id="${site.id}" title="删除">🗑️ 删除</button>
        </div>` : '';

    html += `
        <div class="nav-card" data-id="${site.id}">
            ${adminActions}
            <div class="card-icon">${site.icon || '🔗'}</div>
            <div class="card-title">${escapeHtml(site.title)}</div>
            <div class="card-desc">${escapeHtml(site.description || '')}</div>
            <div style="font-size:0.7rem; color:#8a9dad; margin-top:0.5rem;">${getHostname(site.url)}</div>
        </div>
    `;
});
            
            html += `</div></div>`;
        }
        
        categoriesContainer.innerHTML = html;
        
        // 绑定卡片点击事件（跳转链接）
        document.querySelectorAll('.nav-card').forEach(card => {
            card.addEventListener('click', (e) => {
                // 如果点击的是编辑或删除按钮，不触发跳转
                if (e.target.closest('.card-edit-btn') || e.target.closest('.card-delete-btn')) return;
                const id = card.getAttribute('data-id');
                const site = sitesData.find(s => s.id === id);
                if (site) window.open(site.url, '_blank');
            });
        });
        
        // 绑定编辑按钮事件
        document.querySelectorAll('.card-edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                openEditModal(id);
            });
        });
        
        // 绑定删除按钮事件
        document.querySelectorAll('.card-delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                openDeleteConfirm(id);
            });
        });
    }
    
    // 打开编辑模态框
    function openEditModal(id) {
        const site = sitesData.find(s => s.id === id);
        if (!site) return;
        
        currentEditId = id;
        document.getElementById('linkModalTitle').textContent = '✏️ 编辑链接';
        document.getElementById('linkCategory').value = site.category || '';
        document.getElementById('linkTitle').value = site.title || '';
        document.getElementById('linkDesc').value = site.description || '';
        document.getElementById('linkUrl').value = site.url || '';
        document.getElementById('linkIcon').value = site.icon || '';
        linkModal.classList.add('show');
    }
    
    // 打开删除确认对话框
    function openDeleteConfirm(id) {
        pendingDeleteId = id;
        const site = sitesData.find(s => s.id === id);
        if (site) {
            document.getElementById('confirmMessage').textContent = `确定要删除 "${site.title}" 吗？`;
        }
        confirmModal.classList.add('show');
    }
    
    // 关闭删除确认对话框
    function closeDeleteConfirm() {
        pendingDeleteId = null;
        confirmModal.classList.remove('show');
    }
    
    // 执行删除
    async function executeDelete() {
        if (pendingDeleteId) {
            await deleteLink(pendingDeleteId);
            closeDeleteConfirm();
        }
    }
    
    // 关闭编辑模态框并重置
    function closeLinkModal() {
        currentEditId = null;
        document.getElementById('linkForm').reset();
        linkModal.classList.remove('show');
    }
    
    function showEmptyState(message) {
        categoriesContainer.innerHTML = `<div class="no-results">${message}</div>`;
    }
    
    function showToast(message) {
        // 简单的提示
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.cssText = `
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c5a6e;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 2000;
            animation: fadeOut 2s ease;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // 添加样式动画
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    `;
    document.head.appendChild(style);
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function getHostname(url) {
        try {
            return new URL(url).hostname;
        } catch(e) {
            return url;
        }
    }
    
    // 登录/注册
    // 1. 删除原有的 switchModeBtn 相关事件绑定
// 2. 修改 handleAuth 函数如下：

async function handleAuth() {
    const email = authEmail.value;
    const password = authPassword.value;
    
    // 直接调用登录接口，不再判断 isLoginMode
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    
    if (error) {
        alert('登录失败：账号或密码错误');
        return;
    }
    
    loginModal.classList.remove('show');
    await checkAuth(); // 登录成功后刷新状态并加载数据
}

    // 建议将渲染逻辑封装，减少重复代码
function createCardHtml(site) {
    return `
        <div class="nav-card" data-id="${site.id}">
            <div class="card-actions">
                <button class="card-edit-btn" data-id="${site.id}">✏️ 编辑</button>
                <button class="card-delete-btn" data-id="${site.id}">🗑️ 删除</button>
            </div>
            <div class="card-icon">${site.icon || '🔗'}</div>
            <div class="card-title">${escapeHtml(site.title)}</div>
            <div class="card-desc">${escapeHtml(site.description || '')}</div>
        </div>
    `;
}

// 事件委托：处理所有卡片点击
categoriesContainer.onclick = (e) => {
    const editBtn = e.target.closest('.card-edit-btn');
    const deleteBtn = e.target.closest('.card-delete-btn');
    const card = e.target.closest('.nav-card');

    if (editBtn) {
        openEditModal(editBtn.dataset.id);
    } else if (deleteBtn) {
        openDeleteConfirm(deleteBtn.dataset.id);
    } else if (card) {
        const site = sitesData.find(s => s.id === card.dataset.id);
        if (site) window.open(site.url, '_blank');
    }
};
    
    // 添加或更新链接
    async function saveLink() {
        const category = document.getElementById('linkCategory').value.trim();
        const title = document.getElementById('linkTitle').value.trim();
        const description = document.getElementById('linkDesc').value.trim();
        const url = document.getElementById('linkUrl').value.trim();
        const icon = document.getElementById('linkIcon').value.trim() || '🔗';
        
        if (!category || !title || !url) {
            alert('请填写分类、标题和网址');
            return;
        }
        
        const linkData = {
            category,
            title,
            description,
            url,
            icon
        };
        
        if (currentEditId) {
            // 编辑模式
            await updateLink(currentEditId, linkData);
        } else {
            // 添加模式
            const { error } = await supabaseClient.from('links').insert([{
                user_id: currentUser.id,
                ...linkData
            }]);
            
            if (error) {
                alert('添加失败: ' + error.message);
                return;
            }
            showToast('✅ 已添加');
        }
        
        closeLinkModal();
        await loadLinks();
    }
    
    // 事件绑定
    loginBtn.onclick = () => loginModal.classList.add('show');
    logoutBtn.onclick = async () => {
        await supabaseClient.auth.signOut();
        await checkAuth();
    };
    addLinkBtn.onclick = () => {
        currentEditId = null;
        document.getElementById('linkModalTitle').textContent = '➕ 添加链接';
        document.getElementById('linkForm').reset();
        linkModal.classList.add('show');
    };
    
    document.getElementById('closeLoginModal').onclick = () => loginModal.classList.remove('show');
    document.getElementById('closeLinkModal').onclick = closeLinkModal;
    document.getElementById('cancelDeleteBtn').onclick = closeDeleteConfirm;
    document.getElementById('confirmDeleteBtn').onclick = executeDelete;
    
    // 点击模态框背景关闭
    confirmModal.onclick = (e) => { if(e.target === confirmModal) closeDeleteConfirm(); };
    loginModal.onclick = (e) => { if(e.target === loginModal) loginModal.classList.remove('show'); };
    linkModal.onclick = (e) => { if(e.target === linkModal) closeLinkModal(); };

    
    authForm.onsubmit = (e) => {
        e.preventDefault();
        handleAuth();
    };
    
    document.getElementById('linkForm').onsubmit = (e) => {
        e.preventDefault();
        saveLink();
    };
    
    searchInput.oninput = (e) => {
        const keyword = e.target.value.toLowerCase();
        if (!keyword) {
            render();
            return;
        }
        const filtered = sitesData.filter(site => 
            site.title.toLowerCase().includes(keyword) ||
            (site.description && site.description.toLowerCase().includes(keyword)) ||
            site.category.toLowerCase().includes(keyword)
        );
        
        if (filtered.length === 0) {
            categoriesContainer.innerHTML = '<div class="no-results">🔍 没有找到相关链接</div>';
        } else {
            const groups = {};
            filtered.forEach(site => {
                if (!groups[site.category]) groups[site.category] = [];
                groups[site.category].push(site);
            });
            let html = '';
            for (const [category, items] of Object.entries(groups)) {
                html += `<div class="category"><div class="category-header"><div class="category-title">${category} (${items.length})</div></div><div class="card-grid">`;
                items.forEach(site => {
                    html += `<div class="nav-card"><div class="card-icon">${site.icon || '🔗'}</div><div class="card-title">${escapeHtml(site.title)}</div><div class="card-desc">${escapeHtml(site.description || '')}</div></div>`;
                });
                html += `</div></div>`;
            }
            categoriesContainer.innerHTML = html;
        }
    };
    
    // 主题切换
    let isDark = false;
    document.getElementById('themeToggleBtn').onclick = () => {
        isDark = !isDark;
        document.body.style.background = isDark ? '#0f1724' : 'linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%)';
        document.body.style.color = isDark ? '#eef2ff' : '#1a2c3e';
        
        // 简单设置卡片背景
        const cards = document.querySelectorAll('.nav-card');
        cards.forEach(card => {
            card.style.background = isDark ? '#1e2933' : 'white';
            card.style.color = isDark ? '#eef2ff' : '#1a2c3e';
        });
    };
    
    // 布局切换
    let isList = false;
    document.getElementById('layoutToggleBtn').onclick = () => {
        isList = !isList;
        const grid = document.querySelector('.card-grid');
        if (grid) grid.style.display = isList ? 'flex' : 'grid';
        document.getElementById('layoutToggleBtn').textContent = isList ? '🗂️ 网格视图' : '📋 列表视图';
    };
    
    // 启动
    async function start() {
        await initSupabase();
        await checkAuth();
    }
    
    start();
</script>
</body>
</html>
