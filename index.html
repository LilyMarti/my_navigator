<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能简历编辑器Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 信息行容器 */
.info-row {
    display: flex;
    flex-wrap: wrap;       /* 允许在必要时换行，防止冲出纸张 */
    gap: 25px;            /* 控制标签组之间的物理间距 */
}

/* 每一个标签组（例如“电话：138...”） */
.info-item {
    white-space: nowrap;   /* 核心：确保标签和内容永远连在一起，不会在冒号处断开 */
    display: inline-flex;
    align-items: center;
    color: #475569;        /* 柔和的深灰色 */
}

/* 重点优化地址显示 */
#header-meta .info-row:last-child .info-item:last-child {
    flex: 1;               /* 让地址占据剩余空间 */
    white-space: normal;   /* 允许长地址在行末正常折行，不横向溢出 */
    word-break: break-all;


}
#outPersonal {
    /* 1. 字体与行高 */
    font-size: 0.9rem;
    line-height: 1.7;
    color: #475569;

    /* 2. 换行核心：保留回车符，同时在容器边缘自动折行 */
    white-space: pre-wrap; 
    
    /* 3. 溢出控制：强制长单词或连续字符断行，防止冲出纸张边界 */
    word-wrap: break-word;
    word-break: break-all;
    
    /* 4. 布局对齐 */
    text-align: justify;  /* 两端对齐，使简历边缘整齐 */
    max-width: 100%;      /* 严禁超过父容器宽度 */
    padding: 5px 0;
}

#header-meta {
    display: grid;
    /* 核心：定义三列，宽度平分（1fr）或固定宽度 */
    grid-template-columns: repeat(3, 1fr); 
    /* 定义两行，行间距 10px */
    grid-row-gap: 10px;
    /* 列间距 20px */
    grid-column-gap: 20px; 
    
    margin-top: 15px;
    font-size: 0.9rem;
    color: #475569;
}

.info-item {
    /* 确保标签前缀和内容是一个整体，不换行 */
    display: flex;
    white-space: nowrap; 
    /* 即使内容很长，也会在格子内处理，不会挤压旁边的标签 */
    overflow: hidden; 
}

/* 针对家庭住址的特殊处理：让它横跨剩余的格子（如果是三列，地址可以占两列） */
.addr-item {
    grid-column: span 2; 
    white-space: normal; /* 允许地址长的时候在格子内换行 */
    word-break: break-all;
}

/* 打印 PDF 时的布局稳定性 */
@media print {
    #header-meta {
        display: grid !important;
        grid-template-columns: repeat(3, 1fr) !important;
    }
}
.avatar-container {
    width: 100px;
    height: 125px;
    border: 1px solid #e5e7eb;
    padding: 3px;
    background: #fff;
    border-radius: 4px;
}

/* 优雅的分隔水平线 */
.header-divider {
    width: 100%;
    height: 2px;
    background: linear-gradient(to right, var(--primary-color), transparent);
    margin-bottom: 25px;
    opacity: 0.6;
} 

    </style>
</head>
<body>

<!-- 顶部浮动控制条 -->
<div class="floating-toolbar">
    <div class="toolbar-col">
        <h4>文件导出</h4>
        <button class="toolbar-btn" onclick="exportPDF()">保存为 PDF 简历</button>
    </div>
    
    <div class="toolbar-col">
        <h4>简历模板风格</h4>
        <select class="toolbar-select" id="tplSelect" onchange="changeTemplate()">
            <option value="tpl-modern">现代商务风格 (Modern)</option>
            <option value="tpl-classic">传统学术风格 (Classic)</option>
            <option value="tpl-sideline">极简高亮风格 (Highlight)</option>
    <option value="tpl-navy">海军蓝政企风 (Navy Professional)</option>
<option value="tpl-gentle">优雅米色风格 (Gentle Beige)</option>
        </select>
    </div>
    
    <div class="toolbar-col">
        <h4>自定义色调</h4>
        <input type="color" id="themeColor" value="#2563eb" oninput="updateStyle()" style="width:100%; height:36px; border:1px solid #e2e8f0; border-radius:8px; cursor:pointer; background:white; padding:2px;">
    </div>
</div>

<div class="editor-side">
    <div class="mode-switcher">
        <button class="mode-btn active" id="btn-pro" onclick="switchMode('pro')">职场模式</button>
        <button class="mode-btn" id="btn-stu" onclick="switchMode('stu')">学生模式</button>
    </div>

    <h2>基本信息</h2>
    <div class="editor-section">
        <div class="form-group">
            <label>上传个人头像 (推荐比例 4:5)</label>
            <input type="file" accept="image/*" onchange="handleAvatar(event)">
        </div>
        <div class="form-group"><label>真实姓名</label><input type="text" id="inName" placeholder="例如：王小明" oninput="render()"></div>
        
        <div style="display:flex; gap:10px">
            <div class="form-group" style="flex:2"><label>☎️联系电话</label><input type="text" id="inPhone" placeholder="138-0000-0000" oninput="render()"></div>
            <div class="form-group" style="flex:1"><label>年龄/经验</label><input type="text" id="inAge" placeholder="25岁" oninput="render()"></div>
           
        </div>
         <div class="form-group" style="flex:4"><label>家庭住址</label><input type="text" id="addr" placeholder="例如：南宁" oninput="render()"></div>
        
    </div>
    <div> <div class="form-group" style="flex:3"><label>学历</label><input type="text" id="edu" placeholder="例如：本科" oninput="render()"></div>
<div class="form-group"><label>📮电子邮箱</label><input type="text" id="inEmail" placeholder="example@email.com" oninput="render()"></div>           
</div>

     <h2>教育背景 <button class="btn-add" onclick="addItem('edu')">+ 添加</button></h2>
    <div id="eduInputs"></div>
    <div id="pro-experience">
        <h2>工作经历 <button class="btn-add" onclick="addItem('exp')">+ 添加</button></h2>
        <div id="expInputs"></div>
    </div>

    <div id="stu-experience" style="display:none;">
        <h2>实习经历 <button class="btn-add" onclick="addItem('intern')">+ 添加</button></h2>
        <div id="internInputs"></div>
        <h2>校园活动/项目 <button class="btn-add" onclick="addItem('campus')">+ 添加</button></h2>
        <div id="campusInputs"></div>
    </div>

  

    <h2 style="text-align: justify;">专业技能 / 荣誉证书</h2>
    <div class="form-group"><label for="">个人技能</label><textarea name="" id="inPersonal",rows=3, placeholder="请在左侧输入您的擅长技能..." oninput="render()"></textarea></div>
    <div class="editor-section">
        <label>标签式输入 (用逗号隔开)</label>
        <textarea id="inSkills" rows="3" placeholder="Python, 英语六级, 计算机二级, 优秀毕业生..." oninput="render()"></textarea>
    </div>
    
    <div class="form-group"><label>个人评价 / 核心优势</label><textarea id="inSummary" rows="3" placeholder="3-5句话概括你的核心竞争力..." oninput="render()"></textarea></div>
</div>

<div class="preview-side">
   
    <div class="resume-paper tpl-modern" id="resume-content">
          <div class="top-black"><h1>个 人 简 历</h1></div>
        <div class="resume-header">
          
            <div style="flex: 1;">
                <h1 id="outName" style="font-size: 2.2rem; margin-bottom: 10px;">王小明</h1>
                <div id="header-meta" style="color: var(--text-sub); font-weight: 500;">
                    25岁 | 138-0000-0000 | example@email.com | 本科 | 北京市朝阳区
                </div>
            </div>
            <img id="outAvatar" class="avatar-preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
        </div>

        

        <div id="exp-section">
            
        <div class="section-title">教育背景 / Education </div>
        <div id="outEdu"></div>
            <div class="section-title" id="exp-title">工作经历 / Experience</div>
            <div id="outExp"></div>
        </div>

        <div id="campus-section" style="display:none;">
            <div class="section-title">校园与实践 / Campus</div>
            <div id="outCampus"></div>
        </div>
       <div class="section-title">个人技能 / Personality Skills</div>
<div class="desc" id="outPersonal" style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; color: #64748b;">请在左侧输入您的个人技能...</div>

        <div class="section-title">证书 / Honors</div>
        <div id="outSkills" class="tag-container"></div>

        <div class="section-title">个人评价  / self-comments</div>
        <div class="desc" id="outSummary" style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; color: #64748b;">请在左侧输入您的个人评价...</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
