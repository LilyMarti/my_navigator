<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的灵动导航 | 云同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1.5rem 4rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        /* 暗夜模式样式 */
body.dark-mode {
    background: #0f1724 !important;
    color: #eef2ff !important;
}

body.dark-mode .nav-card {
    background: #1e2933;
    border-color: #2d3d4d;
    color: #eef2ff;
}

body.dark-mode .card-title { color: #fff; }
body.dark-mode .card-desc { color: #8a9dad; }

/* 列表视图布局 */
.card-grid.list-view {
    display: flex !important;
    flex-direction: column;
    gap: 10px;
}

.card-grid.list-view .nav-card {
    flex-direction: row;
    align-items: center;
    padding: 10px 20px;
    gap: 15px;
    height: auto;
}

.card-grid.list-view .card-icon {
    font-size: 1.2rem;
    margin-bottom: 0;
}

.card-grid.list-view .card-actions {
    top: 50%;
    transform: translateY(-50%);
}

        h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #1f3b4c, #2c5a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .toolbar {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #2c5a6e;
            color: white;
            border: none;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
            border: none;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .search-box {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            padding: 0.9rem 1.8rem;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
        }

        .categories {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .category {
            margin-bottom: 1rem;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(44,90,110,0.2);
        }

        .category-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e3b4a;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }

        .nav-card {
            background: white;
            border-radius: 20px;
            padding: 1.2rem;
            text-decoration: none;
            display: block;
            border: 1px solid #e9edf2;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .nav-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 卡片管理按钮（悬浮显示） */
        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
            gap: 5px;
            background: rgba(255,255,255,0.95);
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .nav-card:hover .card-actions {
            display: flex;
        }

        .card-edit-btn, .card-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 16px;
            transition: all 0.2s;
        }

        .card-edit-btn:hover {
            background: #eef2f8;
        }

        .card-delete-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f3b4c;
            margin-bottom: 0.3rem;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #6b7f8e;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,240,0.6);
            border-radius: 48px;
            color: #6b7f8e;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.6rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .form-actions {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-top: 1.2rem;
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.8rem;
            color: #8a9dad;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* 删除确认对话框样式 */
        .confirm-modal {
            max-width: 350px;
            text-align: center;
        }

        .confirm-modal p {
            margin: 1rem 0;
            color: #6b7f8e;
        }

        .confirm-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .toast-message {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); color: white; padding: 8px 16px;
    border-radius: 20px; z-index: 9999; pointer-events: none;
}
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="logo-area">
            <h1>✨ 我的导航栈</h1>
            <div class="toolbar">
                <button id="themeToggleBtn">🌓 暗色模式</button>
                <button id="layoutToggleBtn">📋 列表视图</button>
                <button id="addLinkBtn" class="btn-primary" style="display: none;">➕ 新建</button>
                <button id="loginBtn">🔐 登录</button>
                <span id="userInfo" style="display: none;">
                    <span id="userEmail"></span>
                    <button id="exportBtn" class="btn-secondary" title="导出 JSON">📤 导出</button>
    <button id="importBtn" class="btn-secondary" title="导入 JSON">📥 导入</button>
    <input type="file" id="importFile" accept=".json" style="display: none;">
                    <button id="logoutBtn">🚪 退出</button>
                </span>
            </div>
        </div>
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索网站...">
    </div>

    <div id="categoriesContainer" class="categories">
        <div class="no-results">🔐 请点击右上角"登录"按钮开始使用</div>
    </div>

    <div class="footer">
        <p>⚡ 云同步导航 · 多端数据共享 · 鼠标悬停卡片显示编辑/删除按钮</p>
    </div>
</div>

<!-- 登录模态框 -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>🔐 管理员登录</h3> <form id="authForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="authEmail" required placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="authPassword" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary" id="authSubmitBtn" style="width: 100%;">登录</button>
            </div>
        </form>
        <button id="closeLoginModal" style="margin-top: 1rem; width: 100%; border: none; background: none; color: #8a9dad;">取消</button>
    </div>
</div>

<!-- 添加/编辑链接模态框 -->
<div id="linkModal" class="modal">
    <div class="modal-content">
        <h3 id="linkModalTitle">添加链接</h3>
        <form id="linkForm">
            <div class="form-group">
                <label>分类</label>
                <input type="text" id="linkCategory" required placeholder="📌 常用工具">
            </div>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="linkTitle" required>
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="linkDesc" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>网址</label>
                <input type="url" id="linkUrl" required>
            </div>
            <div class="form-group">
                <label>图标 (Emoji)</label>
                <input type="text" id="linkIcon" placeholder="🔗">
            </div>
            <div class="form-actions">
                <button type="button" id="closeLinkModal">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 删除确认模态框 -->
<div id="confirmModal" class="modal">
    <div class="modal-content confirm-modal">
        <h3>⚠️ 确认删除</h3>
        <p id="confirmMessage">确定要删除这个链接吗？</p>
        <div class="confirm-actions">
            <button id="cancelDeleteBtn" class="btn-secondary">取消</button>
            <button id="confirmDeleteBtn" class="btn-danger">删除</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://uehqgiqwvevvevsxxyoe.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlaHFnaXF3dmV2dmV2c3h4eW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTUyNDcsImV4cCI6MjA5MjkzMTI0N30.P4pAwMmuDB81izf2HB__AAYQ0mXYIZPQoEtrDHoz8JQ';

let supabaseClient = null;
let currentUser = null;
let sitesData = [];
let currentEditId = null;
let pendingDeleteId = null;
let viewMode = 'grid'; 
let isDarkMode = false;

// --- 2. DOM 元素获取 ---
const categoriesContainer = document.getElementById('categoriesContainer');
const searchInput = document.getElementById('searchInput');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const addLinkBtn = document.getElementById('addLinkBtn');
const userInfo = document.getElementById('userInfo');
const userEmailSpan = document.getElementById('userEmail');
const loginModal = document.getElementById('loginModal');
const linkModal = document.getElementById('linkModal');
const confirmModal = document.getElementById('confirmModal');
const authForm = document.getElementById('authForm');
const authEmail = document.getElementById('authEmail');
const authPassword = document.getElementById('authPassword');
const exportBtn = document.getElementById('exportBtn');
const importBtn = document.getElementById('importBtn');
const importFile = document.getElementById('importFile');

// --- 3. 初始化与权限控制 ---
async function initSupabase() {
    if (typeof supabase === 'undefined') return false;
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return true;
}

async function checkAuth() {
    if (!supabaseClient) return;
    const { data: { session } } = await supabaseClient.auth.getSession();
    
    if (session) {
        currentUser = session.user;
        userEmailSpan.textContent = currentUser.email.split('@')[0];
        loginBtn.style.display = 'none';
        userInfo.style.display = 'flex';
        addLinkBtn.style.display = 'inline-flex';
    } else {
        currentUser = null;
        loginBtn.style.display = 'inline-flex';
        userInfo.style.display = 'none';
        addLinkBtn.style.display = 'none';
    }
    await loadLinks();
}

// --- 4. 数据操作 (CRUD & 导入导出) ---
async function loadLinks() {
    const { data, error } = await supabaseClient
        .from('links')
        .select('*')
        .order('created_at', { ascending: false });
        
    if (error) return console.error('加载失败:', error);
    sitesData = data || [];
    render();
}

async function saveLink() {
    if (!currentUser) return alert('权限不足，请先登录');
    const linkData = {
        category: document.getElementById('linkCategory').value.trim(),
        title: document.getElementById('linkTitle').value.trim(),
        description: document.getElementById('linkDesc').value.trim(),
        url: document.getElementById('linkUrl').value.trim(),
        icon: document.getElementById('linkIcon').value.trim() || '🔗'
    };

    const { error } = currentEditId 
        ? await supabaseClient.from('links').update(linkData).eq('id', currentEditId)
        : await supabaseClient.from('links').insert([{ user_id: currentUser.id, ...linkData }]);

    if (error) alert('保存失败: ' + error.message);
    else {
        showToast(currentEditId ? '✅ 已更新' : '✅ 已添加');
        closeLinkModal();
        await loadLinks();
    }
}

async function executeDelete() {
    if (!currentUser || !pendingDeleteId) return;
    const { error } = await supabaseClient.from('links').delete().eq('id', pendingDeleteId);
    if (error) alert('删除失败');
    else {
        showToast('🗑️ 已删除');
        closeDeleteConfirm();
        await loadLinks();
    }
}

// 批量导入
importFile.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file || !currentUser) return;
    const reader = new FileReader();
    reader.onload = async (event) => {
        try {
            const json = JSON.parse(event.target.result);
            if (!Array.isArray(json)) throw new Error('格式错误');
            if (!confirm(`确认导入 ${json.length} 条数据？`)) return;

            const dataToInsert = json.map(item => ({ ...item, user_id: currentUser.id }));
            const { error } = await supabaseClient.from('links').insert(dataToInsert);
            if (error) throw error;
            showToast('✅ 批量导入成功');
            await loadLinks();
        } catch (err) { alert('导入失败: ' + err.message); }
        importFile.value = '';
    };
    reader.readAsText(file);
};

// 导出
exportBtn.onclick = () => {
    const exportData = sitesData.map(({ category, title, description, url, icon }) => ({
        category, title, description, url, icon
    }));
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `nav_backup_${new Date().toLocaleDateString()}.json`;
    a.click();
};

// --- 5. UI 渲染 ---
function render(dataToRender = sitesData) {
    if (!dataToRender.length) {
        categoriesContainer.innerHTML = `<div class="no-results">✨ 暂无内容</div>`;
        return;
    }
    const groups = {};
    dataToRender.forEach(site => {
        if (!groups[site.category]) groups[site.category] = [];
        groups[site.category].push(site);
    });

    let html = '';
    for (const [category, items] of Object.entries(groups)) {
        const gridClass = viewMode === 'list' ? 'card-grid list-view' : 'card-grid';
        html += `<div class="category">
            <div class="category-header"><div class="category-title">${escapeHtml(category)} (${items.length})</div></div>
            <div class="${gridClass}">`;
        items.forEach(site => {
            const adminActions = currentUser ? `
                <div class="card-actions">
                    <button class="card-edit-btn" data-id="${site.id}">✏️</button>
                    <button class="card-delete-btn" data-id="${site.id}">🗑️</button>
                </div>` : '';
            html += `
                <div class="nav-card" data-id="${site.id}">
                    ${adminActions}
                    <div class="card-icon">${site.icon || '🔗'}</div>
                    <div style="flex:1">
                        <div class="card-title">${escapeHtml(site.title)}</div>
                        <div class="card-desc">${escapeHtml(site.description || '')}</div>
                    </div>
                </div>`;
        });
        html += `</div></div>`;
    }
    categoriesContainer.innerHTML = html;
}

// --- 6. 事件绑定与辅助 ---
function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast-message'; // 需在CSS中定义样式
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// 基础交互
categoriesContainer.onclick = (e) => {
    const editBtn = e.target.closest('.card-edit-btn');
    const deleteBtn = e.target.closest('.card-delete-btn');
    const card = e.target.closest('.nav-card');
    if (editBtn) openEditModal(editBtn.dataset.id);
    else if (deleteBtn) openDeleteConfirm(deleteBtn.dataset.id);
    else if (card) {
        const site = sitesData.find(s => s.id === card.dataset.id);
        if (site) window.open(site.url, '_blank');
    }
};

document.getElementById('layoutToggleBtn').onclick = () => {
    viewMode = (viewMode === 'grid' ? 'list' : 'grid');
    document.getElementById('layoutToggleBtn').innerHTML = viewMode === 'list' ? '🗂️ 网格' : '📋 列表';
    render();
};

document.getElementById('themeToggleBtn').onclick = () => {
    isDarkMode = !isDarkMode;
    document.body.classList.toggle('dark-mode', isDarkMode);
    document.getElementById('themeToggleBtn').innerHTML = isDarkMode ? '☀️ 浅色' : '🌙 深色';
    localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
};

searchInput.oninput = (e) => {
    const kw = e.target.value.toLowerCase();
    render(sitesData.filter(s => s.title.toLowerCase().includes(kw) || s.category.toLowerCase().includes(kw)));
};

// 模态框控制
function openEditModal(id) {
    const site = sitesData.find(s => s.id === id);
    if (!site) return;
    currentEditId = id;
    document.getElementById('linkModalTitle').textContent = '✏️ 编辑链接';
    document.getElementById('linkCategory').value = site.category;
    document.getElementById('linkTitle').value = site.title;
    document.getElementById('linkDesc').value = site.description;
    document.getElementById('linkUrl').value = site.url;
    document.getElementById('linkIcon').value = site.icon;
    linkModal.classList.add('show');
}
function closeLinkModal() { linkModal.classList.remove('show'); currentEditId = null; }
function openDeleteConfirm(id) { pendingDeleteId = id; confirmModal.classList.add('show'); }
function closeDeleteConfirm() { confirmModal.classList.remove('show'); }

// 按钮点击
loginBtn.onclick = () => loginModal.classList.add('show');
addLinkBtn.onclick = () => { currentEditId = null; document.getElementById('linkForm').reset(); linkModal.classList.add('show'); };
importBtn.onclick = () => importFile.click();
logoutBtn.onclick = async () => { await supabaseClient.auth.signOut(); checkAuth(); };
authForm.onsubmit = (e) => { e.preventDefault(); handleAuth(); };
document.getElementById('linkForm').onsubmit = (e) => { e.preventDefault(); saveLink(); };
document.getElementById('confirmDeleteBtn').onclick = executeDelete;
document.getElementById('cancelDeleteBtn').onclick = closeDeleteConfirm;

// --- 7. 启动 ---
async function start() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        isDarkMode = true;
        document.body.classList.add('dark-mode');
    }
    await initSupabase();
    await checkAuth();
}

start();
</script>
</body>
</html>
