<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的灵动导航 | Supabase 云同步版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1a2c3e;
            line-height: 1.4;
            padding: 2rem 1.5rem 4rem;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 100px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        /* 头部区域 */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 1.2rem;
        }

        .site-title {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f3b4c, #2c5a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            background: #e9edf2;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c5a6e;
        }

        .toolbar {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #1f3b4c;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .icon-btn:hover {
            background: #ffffff;
            border-color: #bdd3e6;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            transform: translateY(-1px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 0.3rem 0.8rem 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2c5a6e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .search-wrapper {
            max-width: 560px;
            margin: 0 auto 1.8rem auto;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 0.9rem 1.8rem;
            font-size: 1rem;
            border: none;
            border-radius: 60px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.25s;
            font-weight: 450;
            outline: none;
            border: 1px solid #e2e8f0;
        }

        .search-box:focus {
            border-color: #6c9ebf;
            box-shadow: 0 12px 24px rgba(44, 90, 110, 0.12);
            transform: scale(1.01);
        }

        /* 分类区域 */
        .categories {
            display: flex;
            flex-direction: column;
            gap: 2.8rem;
        }

        .category {
            background: transparent;
            scroll-margin-top: 90px;
            position: relative;
        }

        .category-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid rgba(44, 90, 110, 0.25);
        }

        .category-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1e3b4a;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .category-title span {
            font-size: 1.1rem;
            background: #dce5ec;
            padding: 0.15rem 0.55rem;
            border-radius: 30px;
            font-weight: 500;
        }

        .count-badge {
            font-size: 0.75rem;
            background: #eef2f6;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: #2c5a6e;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .nav-card {
            background: white;
            border-radius: 24px;
            padding: 1.2rem;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            border: 1px solid #e9edf2;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            position: relative;
            cursor: pointer;
        }

        .nav-card:hover {
            transform: translateY(-4px);
            border-color: #cbdde9;
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.12);
        }

        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f3b4c;
            margin-bottom: 0.45rem;
            word-break: break-word;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #5b6f7e;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-url {
            font-size: 0.7rem;
            color: #8a9dad;
            margin-top: 0.65rem;
            word-break: break-all;
            font-family: monospace;
            border-top: 1px dashed #eef2f8;
            padding-top: 0.5rem;
        }

        .card-admin-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
            gap: 6px;
            background: rgba(255,255,255,0.95);
            padding: 4px 8px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .nav-card:hover .card-admin-actions {
            display: flex;
        }

        .card-edit-btn, .card-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .card-edit-btn:hover {
            background: #eef2f8;
        }

        .card-delete-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .no-results {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255,255,240,0.6);
            border-radius: 48px;
            color: #6b7f8e;
            font-size: 1.1rem;
            border: 1px dashed #cbdde2;
        }

        .footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.8rem;
            color: #7e95a5;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 2rem;
        }

        /* 暗色主题 */
        body.dark {
            background: #0f1724;
            color: #eef2ff;
        }

        body.dark .nav-card {
            background: #1e2933;
            border-color: #2d3a44;
        }

        body.dark .nav-card:hover {
            background: #263340;
            border-color: #4a6272;
        }

        body.dark .card-title {
            color: #f0f6fc;
        }

        body.dark .card-desc, body.dark .card-url {
            color: #a9becd;
        }

        body.dark .search-box {
            background: #1e2a36;
            border-color: #344653;
            color: #ecf3f9;
        }

        body.dark .icon-btn {
            background: #1f2b36;
            color: #ccdee9;
            border-color: #314652;
        }

        body.dark .category-title {
            color: #cae3f0;
        }

        body.dark .badge, body.dark .count-badge {
            background: #2b3f4c;
            color: #caddf0;
        }

        body.dark .card-admin-actions {
            background: #2d3a44;
        }

        body.dark .user-info {
            background: #1e2933;
            border-color: #314652;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            padding: 1.8rem;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }

        body.dark .modal-content {
            background: #1e2933;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            font-size: 1.4rem;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #8a9dad;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.95rem;
            background: white;
        }

        body.dark .form-group input, 
        body.dark .form-group select, 
        body.dark .form-group textarea {
            background: #2d3a44;
            border-color: #4a6272;
            color: white;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn-primary, .btn-secondary {
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary {
            background: #2c5a6e;
            color: white;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #1f3b4c;
        }

        .list-view .card-grid {
            display: flex;
            flex-direction: column;
        }
        .list-view .nav-card {
            flex-direction: row;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .list-view .card-icon {
            margin-bottom: 0;
            font-size: 1.8rem;
        }
        .list-view .card-url {
            border-top: none;
            margin-left: auto;
            padding-top: 0;
        }

        @media (max-width: 640px) {
            body { padding: 1.2rem; }
            .card-grid { grid-template-columns: 1fr; }
            .list-view .nav-card { flex-direction: column; align-items: flex-start; }
            .list-view .card-url { margin-left: 0; }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c5a6e;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 2001;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #2c5a6e;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="logo-area">
            <div class="site-title">
                <h1>✨ 我的导航栈</h1>
                <div class="badge">☁️ 云同步 · 多端共享</div>
            </div>
            <div class="toolbar">
                <button id="themeToggleBtn" class="icon-btn">🌓 暗色模式</button>
                <button id="layoutToggleBtn" class="icon-btn">📋 列表视图</button>
                <div id="userInfoArea" class="user-info" style="display: none;">
                    <span id="userEmail" style="font-size: 0.85rem;"></span>
                    <button id="logoutBtn" class="icon-btn" style="padding: 0.2rem 0.6rem;">🚪</button>
                </div>
                <button id="loginBtn" class="icon-btn">🔐 登录</button>
            </div>
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索网站名称、描述或标签..." autocomplete="off">
        </div>
    </div>

    <div id="categoriesContainer" class="categories">
        <div class="loading-spinner">⏳ 加载中，请稍候...</div>
    </div>

    <div class="footer">
        <p>⚡ 支持多端同步 · 数据云端存储 · 登录后即可管理</p>
    </div>
</div>

<!-- 登录模态框 -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>🔐 登录 / 注册</h3>
            <button class="close-modal" id="closeLoginModalBtn">&times;</button>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>邮箱 *</label>
                <input type="email" id="loginEmail" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>密码 *</label>
                <input type="password" id="loginPassword" required placeholder="至少6位">
            </div>
            <div class="form-actions">
                <button type="button" id="switchToRegisterBtn" class="btn-secondary">注册新账号</button>
                <button type="submit" class="btn-primary">登录</button>
            </div>
        </form>
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label>邮箱 *</label>
                <input type="email" id="registerEmail" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>密码 *</label>
                <input type="password" id="registerPassword" required placeholder="至少6位">
            </div>
            <div class="form-actions">
                <button type="button" id="switchToLoginBtn" class="btn-secondary">返回登录</button>
                <button type="submit" class="btn-primary">注册</button>
            </div>
        </form>
    </div>
</div>

<!-- 添加/编辑链接模态框 -->
<div id="linkFormModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="formModalTitle">➕ 添加链接</h3>
            <button class="close-modal" id="closeFormModalBtn">&times;</button>
        </div>
        <form id="linkForm">
            <div class="form-group">
                <label>分类 *</label>
                <input type="text" id="formCategory" placeholder="例如：📌 常用工具" required>
            </div>
            <div class="form-group">
                <label>标题 *</label>
                <input type="text" id="formTitle" placeholder="网站名称" required>
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="formDesc" rows="2" placeholder="简短描述"></textarea>
            </div>
            <div class="form-group">
                <label>URL *</label>
                <input type="url" id="formUrl" placeholder="https://..." required>
            </div>
            <div class="form-group">
                <label>图标 (Emoji)</label>
                <input type="text" id="formIcon" placeholder="🔗" maxlength="10">
            </div>
            <div class="form-actions">
                <button type="button" id="cancelFormBtn" class="btn-secondary">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ========== Supabase 配置 ==========
    // 请在此处填入你的 Supabase 项目配置
    const SUPABASE_URL = 'https://uehqgiqwvevvevsxxyoe.supabase.co';      // 替换为你的 Supabase URL
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlaHFnaXF3dmV2dmV2c3h4eW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTUyNDcsImV4cCI6MjA5MjkzMTI0N30.P4pAwMmuDB81izf2HB__AAYQ0mXYIZPQoEtrDHoz8JQ';                    // 替换为你的 anon key
    
    // 注意：使用前需要先创建数据库表，SQL 语句如下：
    /*
    -- 创建链接表
    CREATE TABLE links (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
      category TEXT NOT NULL,
      title TEXT NOT NULL,
      description TEXT,
      url TEXT NOT NULL,
      icon TEXT DEFAULT '🔗',
      created_at TIMESTAMPTZ DEFAULT NOW(),
      updated_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    -- 开启 RLS
    ALTER TABLE links ENABLE ROW LEVEL SECURITY;
    
    -- 用户只能看到自己的链接
    CREATE POLICY "Users can view own links" ON links
      FOR SELECT USING (auth.uid() = user_id);
    
    -- 用户只能插入自己的链接
    CREATE POLICY "Users can insert own links" ON links
      FOR INSERT WITH CHECK (auth.uid() = user_id);
    
    -- 用户只能更新自己的链接
    CREATE POLICY "Users can update own links" ON links
      FOR UPDATE USING (auth.uid() = user_id);
    
    -- 用户只能删除自己的链接
    CREATE POLICY "Users can delete own links" ON links
      FOR DELETE USING (auth.uid() = user_id);
    */
    
    let supabase = null;
    let currentUser = null;
    let sitesData = [];
    let currentEditId = null;
    let currentSearchKeyword = '';
    let isListView = false;
    let isDarkMode = false;
    
    // DOM 元素
    const categoriesContainer = document.getElementById('categoriesContainer');
    const searchInput = document.getElementById('searchInput');
    const themeBtn = document.getElementById('themeToggleBtn');
    const layoutBtn = document.getElementById('layoutToggleBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfoArea = document.getElementById('userInfoArea');
    const userEmailSpan = document.getElementById('userEmail');
    const loginModal = document.getElementById('loginModal');
    const linkFormModal = document.getElementById('linkFormModal');
    const noResultDiv = document.querySelector('.no-results');
    
    const categoryOrder = ["📌 常用工具", "🎨 设计灵感", "📰 资讯阅读", "💻 开发文档", "🎮 娱乐影音", "常用导航", "编程学习", "🎥影视娱乐", "外语学习", "🧰工具导航", "🔍资源搜索", "🏛️国家政务信息公示"];
    
    // 初始化 Supabase
    function initSupabase() {
        if (SUPABASE_URL === 'https://your-project.supabase.co' || SUPABASE_ANON_KEY === 'your-anon-key') {
            console.warn('请先配置 Supabase URL 和 Anon Key');
            showToast('⚠️ 请先配置 Supabase 连接信息');
            return false;
        }
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        return true;
    }
    
    // 检查登录状态
    async function checkAuth() {
        if (!supabase) return false;
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            updateUIForUser();
            await loadLinks();
            return true;
        } else {
            currentUser = null;
            updateUIForUser();
            sitesData = [];
            renderEmptyState();
            return false;
        }
    }
    
    function updateUIForUser() {
        if (currentUser) {
            loginBtn.style.display = 'none';
            userInfoArea.style.display = 'flex';
            userEmailSpan.textContent = currentUser.email.split('@')[0];
        } else {
            loginBtn.style.display = 'inline-flex';
            userInfoArea.style.display = 'none';
        }
    }
    
    // 加载链接数据
    async function loadLinks() {
        if (!currentUser) return;
        showLoading();
        const { data, error } = await supabase
            .from('links')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error('加载失败:', error);
            showToast('加载失败: ' + error.message);
            return;
        }
        sitesData = data || [];
        render();
    }
    
    // 添加链接
    async function addLink(link) {
        if (!currentUser) {
            showToast('请先登录');
            return false;
        }
        const { data, error } = await supabase
            .from('links')
            .insert([{ ...link, user_id: currentUser.id }])
            .select();
        
        if (error) {
            showToast('添加失败: ' + error.message);
            return false;
        }
        showToast('添加成功');
        await loadLinks();
        return true;
    }
    
    // 更新链接
    async function updateLink(id, link) {
        const { error } = await supabase
            .from('links')
            .update({ ...link, updated_at: new Date() })
            .eq('id', id);
        
        if (error) {
            showToast('更新失败: ' + error.message);
            return false;
        }
        showToast('更新成功');
        await loadLinks();
        return true;
    }
    
    // 删除链接
    async function deleteLink(id) {
        const { error } = await supabase
            .from('links')
            .delete()
            .eq('id', id);
        
        if (error) {
            showToast('删除失败: ' + error.message);
            return false;
        }
        showToast('删除成功');
        await loadLinks();
        return true;
    }
    
    // 渲染函数
    function render() {
        let filtered = sitesData;
        if (currentSearchKeyword.trim()) {
            const kw = currentSearchKeyword.trim().toLowerCase();
            filtered = sitesData.filter(site => 
                site.title.toLowerCase().includes(kw) ||
                (site.description && site.description.toLowerCase().includes(kw)) ||
                site.category.toLowerCase().includes(kw) ||
                site.url.toLowerCase().includes(kw)
            );
        }
        
        if (filtered.length === 0) {
            categoriesContainer.innerHTML = '';
            const emptyMsg = document.createElement('div');
            emptyMsg.className = 'no-results';
            emptyMsg.textContent = currentUser ? '✨ 暂无链接，点击右上角登录按钮旁的 + 号添加' : '🔐 请先登录查看你的导航链接';
            categoriesContainer.appendChild(emptyMsg);
            return;
        }
        
        const categoryMap = new Map();
        for (const item of filtered) {
            if (!categoryMap.has(item.category)) categoryMap.set(item.category, []);
            categoryMap.get(item.category).push(item);
        }
        
        const orderedCategories = [];
        for (const key of categoryOrder) {
            if (categoryMap.has(key)) {
                orderedCategories.push({ name: key, items: categoryMap.get(key) });
                categoryMap.delete(key);
            }
        }
        for (const [name, items] of categoryMap.entries()) {
            orderedCategories.push({ name, items });
        }
        
        let html = '';
        for (const cat of orderedCategories) {
            const safeId = cat.name.replace(/[^\w\u4e00-\u9fa5]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '').toLowerCase();
            html += `<div class="category" id="cat-${safeId}">
                <div class="category-header">
                    <div class="category-title">
                        <a href="#cat-${safeId}" class="anchor-link" style="text-decoration:none;">🔗</a>
                        ${escapeHtml(cat.name)} <span>${cat.items.length}</span>
                    </div>
                    <div class="count-badge">${cat.items.length}个站点</div>
                </div>
                <div class="card-grid">`;
            for (const site of cat.items) {
                html += `<div class="nav-card" data-id="${site.id}">
                    <div class="card-admin-actions">
                        <button class="card-edit-btn" data-id="${site.id}" title="编辑">✏️</button>
                        <button class="card-delete-btn" data-id="${site.id}" title="删除">🗑️</button>
                    </div>
                    <a href="${escapeHtml(site.url)}" target="_blank" rel="noopener noreferrer" style="text-decoration: none; display: contents;">
                        <div class="card-icon">${escapeHtml(site.icon) || '🔗'}</div>
                        <div class="card-title">${escapeHtml(site.title)}</div>
                        <div class="card-desc">${escapeHtml(site.description) || '暂无描述'}</div>
                        <div class="card-url">${truncateUrl(site.url)}</div>
                    </a>
                </div>`;
            }
            html += `</div></div>`;
        }
        categoriesContainer.innerHTML = html;
        
        // 绑定事件
        document.querySelectorAll('.card-edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                openEditModal(id);
            });
        });
        document.querySelectorAll('.card-delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (confirm('确定删除这个链接吗？')) {
                    await deleteLink(id);
                }
            });
        });
        
        applyLayoutClass();
    }
    
    function renderEmptyState() {
        categoriesContainer.innerHTML = '<div class="no-results">🔐 请先登录使用云同步导航</div>';
    }
    
    function showLoading() {
        categoriesContainer.innerHTML = '<div class="loading-spinner">⏳ 加载中...</div>';
    }
    
    function openEditModal(id) {
        const site = sitesData.find(s => s.id === id);
        if (!site) return;
        currentEditId = id;
        document.getElementById('formModalTitle').textContent = '✏️ 编辑链接';
        document.getElementById('formCategory').value = site.category || '';
        document.getElementById('formTitle').value = site.title || '';
        document.getElementById('formDesc').value = site.description || '';
        document.getElementById('formUrl').value = site.url || '';
        document.getElementById('formIcon').value = site.icon || '';
        linkFormModal.classList.add('show');
    }
    
    function openAddModal() {
        currentEditId = null;
        document.getElementById('formModalTitle').textContent = '➕ 添加链接';
        document.getElementById('linkForm').reset();
        linkFormModal.classList.add('show');
    }
    
    async function saveLinkFromForm(e) {
        e.preventDefault();
        const linkData = {
            category: document.getElementById('formCategory').value.trim(),
            title: document.getElementById('formTitle').value.trim(),
            description: document.getElementById('formDesc').value.trim(),
            url: document.getElementById('formUrl').value.trim(),
            icon: document.getElementById('formIcon').value.trim() || '🔗'
        };
        
        if (!linkData.category || !linkData.title || !linkData.url) {
            alert('请填写分类、标题和URL');
            return;
        }
        
        if (currentEditId) {
            await updateLink(currentEditId, linkData);
        } else {
            await addLink(linkData);
        }
        closeLinkFormModal();
    }
    
    // 辅助函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function truncateUrl(url) {
        try {
            let host = new URL(url).hostname;
            if (host.length > 30) return host.substring(0, 27) + '...';
            return host;
        } catch(e) {
            return url.length > 35 ? url.substring(0, 32) + '...' : url;
        }
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // 主题和布局
    function applyLayoutClass() {
        if (isListView) {
            document.body.classList.add('list-view');
            layoutBtn.innerHTML = '🗂️ 网格视图';
        } else {
            document.body.classList.remove('list-view');
            layoutBtn.innerHTML = '📋 列表视图';
        }
    }
    
    function setTheme(dark) {
        if (dark) {
            document.body.classList.add('dark');
            themeBtn.innerHTML = '☀️ 明亮模式';
        } else {
            document.body.classList.remove('dark');
            themeBtn.innerHTML = '🌓 暗色模式';
        }
        localStorage.setItem('navThemeDark', dark);
        isDarkMode = dark;
    }
    
    function toggleTheme() { setTheme(!isDarkMode); }
    function toggleLayout() {
        isListView = !isListView;
        applyLayoutClass();
        localStorage.setItem('navLayoutList', isListView);
    }
    
    function onSearchInput(e) {
        currentSearchKeyword = e.target.value;
        render();
    }
    
    function loadPreferences() {
        const savedTheme = localStorage.getItem('navThemeDark');
        setTheme(savedTheme === 'true');
        const savedLayout = localStorage.getItem('navLayoutList');
        isListView = savedLayout === 'true';
        applyLayoutClass();
    }
    
    // 认证相关
    async function handleLogin(email, password) {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            showToast('登录失败: ' + error.message);
            return false;
        }
        currentUser = data.user;
        updateUIForUser();
        await loadLinks();
        loginModal.classList.remove('show');
        showToast('登录成功');
        return true;
    }
    
    async function handleRegister(email, password) {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
            showToast('注册失败: ' + error.message);
            return false;
        }
        showToast('注册成功，请查收验证邮件（可选）');
        return true;
    }
    
    async function handleLogout() {
        await supabase.auth.signOut();
        currentUser = null;
        sitesData = [];
        updateUIForUser();
        renderEmptyState();
        showToast('已退出登录');
    }
    
    // 模态框控制
    let isLoginMode = true;
    function openLoginModal() {
        isLoginMode = true;
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        loginModal.classList.add('show');
    }
    
    function closeLoginModal() { loginModal.classList.remove('show'); }
    function closeLinkFormModal() { linkFormModal.classList.remove('show'); }
    
    // 初始化
    async function init() {
        if (!initSupabase()) return;
        loadPreferences();
        
        // 添加管理按钮到工具栏
        const addBtn = document.createElement('button');
        addBtn.className = 'icon-btn';
        addBtn.innerHTML = '➕ 新建';
        addBtn.style.background = '#2c5a6e';
        addBtn.style.color = 'white';
        addBtn.onclick = () => {
            if (!currentUser) {
                showToast('请先登录');
                openLoginModal();
                return;
            }
            openAddModal();
        };
        document.querySelector('.toolbar').appendChild(addBtn);
        
        await checkAuth();
        
        searchInput.addEventListener('input', onSearchInput);
        themeBtn.addEventListener('click', toggleTheme);
        layoutBtn.addEventListener('click', toggleLayout);
        loginBtn.addEventListener('click', openLoginModal);
        logoutBtn.addEventListener('click', handleLogout);
        
        document.getElementById('closeLoginModalBtn').addEventListener('click', closeLoginModal);
        document.getElementById('closeFormModalBtn').addEventListener('click', closeLinkFormModal);
        document.getElementById('cancelFormBtn').addEventListener('click', closeLinkFormModal);
        document.getElementById('linkForm').addEventListener('submit', saveLinkFromForm);
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            await handleLogin(email, password);
        });
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            if (password.length < 6) {
                showToast('密码至少6位');
                return;
            }
            await handleRegister(email, password);
        });
        
        document.getElementById('switchToRegisterBtn').addEventListener('click', () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        });
        
        document.getElementById('switchToLoginBtn').addEventListener('click', () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        });
        
        loginModal.addEventListener('click', (e) => { if(e.target === loginModal) closeLoginModal(); });
        linkFormModal.addEventListener('click', (e) => { if(e.target === linkFormModal) closeLinkFormModal(); });
    }
     window.supabaseClient = supabase;
    init();
</script>
</body>
</html>
